<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Circle with shadow -->
  <circle cx="24" cy="24" r="22" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <!-- White play button containing face -->
  <polygon points="14,10 14,38 40,24" fill="#ffffff"/>
  <!-- Cute wink face fully inside -->
  <!-- Left eye open -->
  <circle cx="20" cy="20" r="2.5" fill="url(#tealGrad)"/>
  <!-- Right eye wink -->
  <path d="M 27 20 L 33 20" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Friendly smile -->
  <path d="M 18 29 Q 25 35 32 29" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>