<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square container -->
  <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <!-- Play button with face -->
  <polygon points="15,12 15,36 38,24" fill="#ffffff"/>
  <!-- Eyes on play button -->
  <ellipse cx="21" cy="21" rx="2.5" ry="3" fill="url(#tealGrad)"/>
  <path d="M 27 21 Q 30 18 33 21" fill="none" stroke="url(#tealGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 19 29 Q 25 35 31 29" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>