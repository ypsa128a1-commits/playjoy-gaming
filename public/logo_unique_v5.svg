<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Square + Circle merge - unique hybrid shape -->
  <rect x="4" y="8" width="28" height="32" rx="6" fill="url(#tealGrad)"/>
  <circle cx="32" cy="24" r="14" fill="url(#tealGrad)"/>
  <!-- Play button mouth -->
  <polygon points="12,18 12,30 22,24" fill="#ffffff"/>
  <!-- Wink eye -->
  <circle cx="28" cy="20" r="2.5" fill="#ffffff"/>
  <path d="M 34 20 L 40 20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 26 30 Q 32 36 38 30" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>