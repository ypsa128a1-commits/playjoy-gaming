<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Play button triangle -->
  <polygon points="8,4 8,44 44,24" fill="url(#tealGrad)"/>
  <!-- Wink eye - left open -->
  <circle cx="20" cy="20" r="3" fill="#ffffff"/>
  <!-- Wink eye - right closed -->
  <path d="M 28 20 Q 31 17 34 20" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Friendly smile -->
  <path d="M 18 32 Q 26 40 34 32" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>