<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="6" y="8" width="36" height="34" rx="8" fill="url(#tealGrad)"/>
  <!-- Single antenna -->
  <line x1="24" y1="8" x2="24" y2="3" stroke="url(#amberGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="24" cy="2" r="2.5" fill="url(#amberGrad)"/>
  <!-- Cute eyes -->
  <circle cx="17" cy="20" r="3" fill="#ffffff"/>
  <circle cx="31" cy="20" r="3" fill="#ffffff"/>
  <!-- Simple smile -->
  <path d="M 18 30 Q 24 35 30 30" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>