<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Three horizontal bars forming abstract play -->
  <rect x="4" y="6" width="40" height="8" rx="4" fill="url(#tealGrad)" opacity="0.4"/>
  <rect x="8" y="20" width="36" height="8" rx="4" fill="url(#tealGrad)" opacity="0.7"/>
  <rect x="12" y="34" width="32" height="8" rx="4" fill="url(#tealGrad)"/>
  <!-- Tiny face on bottom bar -->
  <circle cx="28" cy="38" r="2" fill="#ffffff"/>
  <path d="M 32 40 Q 36 42 40 40" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
</svg>