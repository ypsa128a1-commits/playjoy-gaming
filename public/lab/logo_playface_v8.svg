<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Rounded square -->
  <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#tealGrad)"/>
  <!-- White play button with full face inside -->
  <polygon points="13,10 13,38 38,24" fill="#ffffff"/>
  <!-- Face elements - all inside white triangle -->
  <!-- Open eye left -->
  <circle cx="19" cy="19" r="2.5" fill="url(#tealGrad)"/>
  <!-- Wink eye right -->
  <path d="M 26 19 L 31 19" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 18 28 Q 24 34 30 28" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>