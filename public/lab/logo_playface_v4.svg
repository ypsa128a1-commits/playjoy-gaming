<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <!-- Play button white with face -->
  <polygon points="12,10 12,38 38,24" fill="#ffffff"/>
  <!-- Face fully inside white triangle -->
  <circle cx="18" cy="20" r="2.5" fill="url(#tealGrad)"/>
  <path d="M 25 20 L 30 20" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 17 29 Q 23 35 29 29" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>