<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="2" y="2" width="36" height="36" rx="10" fill="#0a0a0f"/>
  
  <g filter="url(#glow)">
    <!-- C-SHAPE - thick outline, forms face -->
    <path d="M 26 6 
             A 14 14 0 1 0 26 34" 
          fill="none" 
          stroke="url(#tealGrad)" 
          stroke-width="5" 
          stroke-linecap="round"/>
    
    <!-- EYES - teal dots inside C -->
    <circle cx="14" cy="16" r="3" fill="url(#tealGrad)"/>
    <circle cx="14" cy="24" r="3" fill="url(#tealGrad)"/>
    
    <!-- SMILE + PLAY BUTTON INTEGRATED -->
    <!-- Play button filled, positioned in the smile area of C -->
    <polygon points="22,14 22,26 32,20" fill="url(#amberGrad)"/>
    
    <!-- Small smile curve below play button -->
    <path d="M 18 30 Q 20 33 22 30" 
          stroke="url(#amberGrad)" 
          stroke-width="2" 
          stroke-linecap="round" 
          fill="none"/>
  </g>
</svg>
