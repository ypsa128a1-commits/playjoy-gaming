<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="24" cy="24" r="22" fill="url(#tealGrad)"/>
  <!-- Play button cutout effect with face -->
  <polygon points="16,10 16,38 42,24" fill="#ffffff" opacity="0.95"/>
  <!-- Face on play button -->
  <!-- Left eye open -->
  <circle cx="22" cy="22" r="2.5" fill="url(#tealGrad)"/>
  <!-- Right eye wink -->
  <path d="M 29 22 L 34 22" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 21 30 Q 27 35 33 30" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>