<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
  </defs>
  <!-- Play button - larger triangle -->
  <polygon points="4,2 4,46 46,24" fill="url(#tealGrad)"/>
  <!-- Face positioned fully inside the triangle -->
  <!-- Left eye open -->
  <circle cx="18" cy="20" r="3.5" fill="#ffffff"/>
  <!-- Right eye wink -->
  <path d="M 28 20 L 35 20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 17 32 Q 26 42 35 32" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
</svg>