<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Robot Head -->
  <rect x="6" y="6" width="36" height="36" rx="10" ry="10" fill="url(#tealGrad)"/>
  
  <!-- Antenna -->
  <line x1="24" y1="6" x2="24" y2="2" stroke="url(#amberGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="2" r="2" fill="url(#amberGrad)"/>
  
  <!-- Left Eye - LED style -->
  <rect x="12" y="14" width="8" height="4" rx="1" fill="#ffffff"/>
  
  <!-- Right Eye - LED style -->
  <rect x="28" y="14" width="8" height="4" rx="1" fill="#ffffff"/>
  
  <!-- Mouth with play button inside -->
  <rect x="14" y="24" width="20" height="10" rx="3" fill="#ffffff"/>
  <polygon points="20,26 20,32 27,29" fill="url(#amberGrad)"/>
</svg>