name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production

      - name: Create deployment package
        run: tar -czf deploy.tar.gz .next public package.json package-lock.json next.config.mjs tsconfig.json tailwind.config.ts src prisma

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          scp deploy.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/
          ssh root@${{ secrets.VPS_HOST }} "cd /var/www/playjoy.id && rm -rf .next.backup && mv .next .next.backup 2>/dev/null || true && tar -xzf /tmp/deploy.tar.gz && npm install --omit=dev && pm2 restart playjoy || pm2 start npm --name playjoy -- run start && pm2 save"
