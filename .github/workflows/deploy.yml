name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r node_modules deploy/
          cp -r public deploy/
          cp -r src deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.mjs deploy/
          cp tsconfig.json deploy/
          cp tailwind.config.ts deploy/
          cp .env deploy/
          cp -r prisma deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/playjoy.id
            rm -rf .next
            cp -r ${{ github.workspace }}/.next ./
            cp -r ${{ github.workspace }}/node_modules ./
            cp -r ${{ github.workspace }}/src ./
            cp ${{ github.workspace }}/package.json ./
            cp ${{ github.workspace }}/package-lock.json ./
            cp ${{ github.workspace }}/next.config.mjs ./
            cp ${{ github.workspace }}/tsconfig.json ./
            cp ${{ github.workspace }}/tailwind.config.ts ./
            cp ${{ github.workspace }}/.env ./
            cp -r ${{ github.workspace }}/prisma ./
            pm2 restart playjoy || pm2 start npm --name playjoy -- run start
