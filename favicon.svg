<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a888"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Robot Head -->
  <rect x="8" y="8" width="32" height="32" rx="8" ry="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
  
  <!-- Antenna -->
  <circle cx="24" cy="5" r="3" fill="url(#amberGrad)"/>
  <rect x="22" y="6" width="4" height="4" fill="url(#tealGrad)" rx="1"/>
  
  <!-- Left Eye -->
  <rect x="13" y="16" width="8" height="6" rx="2" fill="#ffffff"/>
  <circle cx="17" cy="19" r="2" fill="#1a1a2e"/>
  
  <!-- Right Eye -->
  <rect x="27" y="16" width="8" height="6" rx="2" fill="#ffffff"/>
  <circle cx="31" cy="19" r="2" fill="#1a1a2e"/>
  
  <!-- Simple Smile -->
  <path d="M 16 29 Q 24 36 32 29" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Ear pieces -->
  <rect x="4" y="18" width="4" height="10" rx="2" fill="url(#amberGrad)"/>
  <rect x="40" y="18" width="4" height="10" rx="2" fill="url(#amberGrad)"/>
</svg>